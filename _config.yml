# Site settings
title: "Thenuke Wijesinghe"
description: "Human Rights | Cybersecurity | Windows Forensics "
url: "https://thenukee.github.io" # e.g. https://yourusername.github.io
baseurl: "/JesusSavesButWindowsOverwrites" # e.g. /repo-name if hosted under a project
author:
  name: "LeanBeefPattyGoneDark"
  email: "your.email@example.com"
  bio: "CS undergrad at KDU. I write about what I'm learning in cybersecurity, Windows forensics, and human rights. This site is my public notebook — and a place recruiters can check out what I've been up to."
  avatar: "/assets/img/avatar.png"
  location: "Sri Lanka"
  linkedin: "https://linkedin.com/in/yourprofile"
  github: "https://github.com/yourusername"
  scholar: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - LICENSE
