---
layout: default
---
<article class="project-page">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    <p class="project-tagline">{{ page.tagline }}</p>
    <div class="project-links">
      {% if page.github %}<a href="{{ page.github }}" class="btn btn-outline" target="_blank">GitHub</a>{% endif %}
      {% if page.demo %}<a href="{{ page.demo }}" class="btn btn-primary" target="_blank">Live Demo</a>{% endif %}
      {% if page.writeup %}<a href="{{ page.writeup | relative_url }}" class="btn btn-outline">Write-up</a>{% endif %}
    </div>
  </header>

  {% if page.tech %}
  <div class="tech-stack">
    <h3>Tech Stack</h3>
    <div class="tech-tags">
      {% for t in page.tech %}
      <span class="tech-tag">{{ t }}</span>
      {% endfor %}
    </div>
  </div>
  {% endif %}

  <div class="project-content">
    {{ content }}
  </div>
</article>
