---
layout: default
---
<div class="container">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    <p>{{ page.purpose }}</p>
  </header>

  <div class="project-detail" style="max-width: 750px; margin: 0 auto;">
    {% if page.tech %}
    <div style="margin-bottom: 1.5rem;">
      {% for t in page.tech %}
      <span class="tech-chip" style="display: inline-block; font-size: 0.75rem; padding: 0.2rem 0.6rem; background: var(--accent-glow); color: var(--accent); border-radius: 999px; font-weight: 600; margin-right: 0.4rem; margin-bottom: 0.4rem;">{{ t }}</span>
      {% endfor %}
    </div>
    {% endif %}

    <div class="post-content">
      {{ content }}
    </div>

    <div style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
      {% if page.github %}
      <a href="{{ page.github }}" target="_blank" class="btn btn-outline btn-sm">GitHub →</a>
      {% endif %}
      {% if page.demo %}
      <a href="{{ page.demo }}" target="_blank" class="btn btn-primary btn-sm">Live Demo →</a>
      {% endif %}
      {% if page.writeup %}
      <a href="{{ page.writeup }}" class="btn btn-glass btn-sm">Write-up →</a>
      {% endif %}
    </div>
  </div>
</div>
